---
# Taskfile snippets for CI/CD
# ⚠️  COPY THIS FILE TO infra/Taskfile.yaml — do NOT paste tasks into the root Taskfile.yml
#
# Step 1: cp infra/scripts/taskfile-snippets.yaml infra/Taskfile.yaml
# Step 2: Add this includes block to root Taskfile.yml (the ONLY change to root):
#
#   includes:
#     infra:
#       taskfile: ./infra/Taskfile.yaml
#       dir: ./infra
#
# Tasks are then run as: task infra:encrypt-secrets, task infra:setup-github-cicd, etc.
# Scripts referenced here are in infra/scripts/ and .env is assumed to be in project root (../../.env from infra/)

version: "3"

tasks:

  # =============================================================================
  # CI/CD — Secrets Management
  # =============================================================================

  encrypt-secrets:
    desc: "🔒 Encrypt .env → .env.gpg for committing to the repo"
    dir: scripts
    cmds:
      - ./secrets.sh encrypt
    preconditions:
      - test -f ../../.env

  decrypt-secrets:
    desc: "🔓 Decrypt .env.gpg → .env for local development"
    dir: scripts
    cmds:
      - ./secrets.sh decrypt
    preconditions:
      - test -f ../../.env.gpg

  verify-secrets:
    desc: "🔍 Verify .env file has required variables"
    cmds:
      - |
        REQUIRED_VARS="DATAROBOT_API_TOKEN DATAROBOT_ENDPOINT"
        MISSING=""
        for var in $REQUIRED_VARS; do
          if ! grep -q "^${var}=" ../.env 2>/dev/null; then
            MISSING="$MISSING $var"
          fi
        done
        if [ -n "$MISSING" ]; then
          echo "❌ Missing required variables:$MISSING"
          exit 1
        fi
        echo "✅ All required variables present"

  setup-github-cicd:
    desc: "🔐 Setup GitHub secrets, variables, and labels for CI/CD"
    dir: scripts
    cmds:
      - ./setup-github-cicd.sh

  # =============================================================================
  # CI/CD — Pulumi Backend Management
  # =============================================================================

  pulumi-setup:
    desc: "🛠️  Interactive Pulumi backend setup and stack migration"
    cmds:
      - ./scripts/pulumi-setup.sh

  pulumi-login-azure:
    desc: "☁️  Login to Azure Blob backend"
    cmds:
      - uv run pulumi login azblob://{{.CONTAINER}}
    vars:
      CONTAINER: '{{.CONTAINER | default "pulumi-state"}}'
    preconditions:
      - sh: test -n "$AZURE_STORAGE_ACCOUNT"
        msg: "AZURE_STORAGE_ACCOUNT not set"
      - sh: test -n "$AZURE_STORAGE_KEY"
        msg: "AZURE_STORAGE_KEY not set"

  # =============================================================================
  # CI/CD — Pulumi Operations (used by workflows via task commands)
  # =============================================================================

  select:
    desc: "🚂 Select a Pulumi stack"
    cmds:
      - uv run pulumi stack select {{.CLI_ARGS}}

  up-yes:
    desc: "🔨 Deploy the infrastructure (non-interactive, auto-confirm)"
    cmds:
      - uv run pulumi up -y {{.CLI_ARGS}}

  down-yes:
    desc: "💥 Destroy the infrastructure (non-interactive, auto-confirm)"
    cmds:
      - uv run pulumi destroy -y {{.CLI_ARGS}}

  pulumi:
    desc: "🛠️  Execute a generic pulumi command"
    cmds:
      - uv run pulumi {{.CLI_ARGS}}

  # =============================================================================
  # Usage Examples
  # =============================================================================
  #
  # Secrets management:
  #   task infra:encrypt-secrets        # Encrypt .env → .env.gpg
  #   task infra:decrypt-secrets        # Decrypt for local use
  #   task infra:verify-secrets         # Check required vars
  #   task infra:setup-github-cicd      # Push secrets/variables/labels to GitHub
  #
  # Pulumi backend:
  #   task infra:pulumi-setup           # Interactive backend setup + stack migration
  #   task infra:pulumi-login-azure     # Login to Azure Blob backend
  #
  # Pulumi operations:
  #   task infra:select -- --create dev # Create/select a stack
  #   task infra:up-yes                 # Deploy current stack (non-interactive)
  #   task infra:down-yes               # Destroy current stack (non-interactive)
  #   task infra:pulumi -- stack output --json  # Run any pulumi command
