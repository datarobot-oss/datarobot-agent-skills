---
# Taskfile snippets for CI/CD
# ⚠️  COPY THIS FILE TO infra/Taskfile.yaml — do NOT paste tasks into the root Taskfile.yml
#
# Step 1: cp infra/scripts/taskfile-snippets.yaml infra/Taskfile.yaml
# Step 2: Add this includes block to root Taskfile.yml (the ONLY change to root):
#
#   includes:
#     infra:
#       taskfile: ./infra/Taskfile.yaml
#       dir: ./infra
#
# Tasks are then invoked as: task infra:encrypt-secrets, task infra:up-yes, etc.
# Scripts referenced here are in infra/scripts/ and .env is assumed to be at
# the project root (one level above infra/).

version: "3"

tasks:
  # ---------------------------------------------------------------------------
  # Secrets management
  # ---------------------------------------------------------------------------

  encrypt-secrets:
    desc: "🔒 Encrypt .env → .env.gpg for CI/CD"
    dir: scripts
    cmds:
      - ./secrets.sh encrypt
    preconditions:
      - test -f ../../.env

  decrypt-secrets:
    desc: "🔓 Decrypt .env.gpg → .env for local use"
    dir: scripts
    cmds:
      - ./secrets.sh decrypt
    preconditions:
      - test -f ../../.env.gpg

  verify-secrets:
    desc: "🔍 Verify .env has all required variables"
    cmds:
      - |
        REQUIRED_VARS="DATAROBOT_API_TOKEN DATAROBOT_ENDPOINT"
        MISSING=""
        for var in $REQUIRED_VARS; do
          if ! grep -q "^${var}=" ../.env 2>/dev/null; then
            MISSING="$MISSING $var"
          fi
        done
        if [ -n "$MISSING" ]; then
          echo "❌ Missing required variables:$MISSING"
          exit 1
        fi
        echo "✅ All required variables present"

  setup-github-cicd:
    desc: "🔐 Configure GitHub repo: secrets, variables, and labels"
    dir: scripts
    cmds:
      - ./setup-github-cicd.sh

  setup-gitlab-vars:
    desc: "🔐 Configure GitLab CI/CD variables interactively"
    dir: scripts
    cmds:
      - ./setup-gitlab-variables.sh

  # ---------------------------------------------------------------------------
  # Pulumi backend login (choose the one matching your backend)
  # ---------------------------------------------------------------------------

  pulumi-login-cloud:
    desc: "🌐 Login to Pulumi Cloud (requires PULUMI_ACCESS_TOKEN)"
    cmds:
      - uv run pulumi login

  pulumi-login-azure:
    desc: "☁️  Login to Azure Blob backend (requires AZURE_STORAGE_ACCOUNT + AZURE_STORAGE_KEY)"
    cmds:
      - uv run pulumi login azblob://{{.CONTAINER}}
    vars:
      CONTAINER: "{{.CONTAINER | default \"pulumi-state\"}}"
    preconditions:
      - sh: test -n "$AZURE_STORAGE_ACCOUNT"
        msg: "AZURE_STORAGE_ACCOUNT not set"
      - sh: test -n "$AZURE_STORAGE_KEY"
        msg: "AZURE_STORAGE_KEY not set"

  pulumi-login-s3:
    desc: "☁️  Login to AWS S3 backend (requires AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY)"
    cmds:
      - uv run pulumi login s3://{{.BUCKET}}
    vars:
      BUCKET: "{{.BUCKET | default \"pulumi-state\"}}"
    preconditions:
      - sh: test -n "$AWS_ACCESS_KEY_ID"
        msg: "AWS_ACCESS_KEY_ID not set"

  # ---------------------------------------------------------------------------
  # Pulumi stack operations (all run via uv — no manual venv activation needed)
  # ---------------------------------------------------------------------------

  pulumi:
    desc: "Run an arbitrary Pulumi command: task pulumi -- <args>"
    cmds:
      - uv run pulumi {{.CLI_ARGS}}

  select:
    desc: "Select (or create) a Pulumi stack: task select -- [--create] <stack>"
    cmds:
      - uv run pulumi stack select {{.CLI_ARGS}}

  up-yes:
    desc: "Deploy the current Pulumi stack non-interactively"
    cmds:
      - uv run pulumi up --yes --non-interactive

  down-yes:
    desc: "Destroy the current Pulumi stack non-interactively"
    cmds:
      - uv run pulumi destroy --yes --non-interactive

  pulumi-output:
    desc: "📋 Show Pulumi stack outputs"
    cmds:
      - uv run pulumi stack output {{.FORMAT}}
    vars:
      FORMAT: "{{.FORMAT | default \"--json\"}}"

  # ---------------------------------------------------------------------------
  # Local CI simulation
  # ---------------------------------------------------------------------------

  ci-test-local:
    desc: "🧪 Run all CI checks locally (lint + test)"
    cmds:
      - task: lint-check
      - task: test
      - echo "✅ CI checks passed"

  ci-simulate-deploy:
    desc: "🎭 Simulate a full GitHub Actions deployment locally"
    cmds:
      - task: decrypt-secrets
      - task: install
      - task: ci-test-local
      - task: up-yes
      - echo "✅ Deployment simulation complete"

  # ---------------------------------------------------------------------------
  # Usage examples
  # ---------------------------------------------------------------------------
  #
  # First-time setup (GitHub):
  #   task infra:encrypt-secrets              # encrypt .env → .env.gpg
  #   task infra:setup-github-cicd            # set secrets/variables/labels in GitHub
  #
  # First-time setup (GitLab):
  #   task infra:encrypt-secrets              # encrypt .env → .env.gpg
  #   task infra:setup-gitlab-vars            # set CI/CD variables in GitLab
  #
  # Pulumi backend login (once per machine):
  #   task infra:pulumi-login-cloud           # Pulumi Cloud
  #   task infra:pulumi-login-azure CONTAINER=my-container  # Azure Blob
  #   task infra:pulumi-login-s3 BUCKET=my-bucket           # AWS S3
  #
  # Day-to-day stack operations:
  #   task infra:select -- --create dev       # create/select a stack
  #   task infra:up-yes                       # deploy
  #   task infra:down-yes                     # destroy
  #   task infra:pulumi-output                # show stack outputs
  #   task infra:pulumi -- stack output --json  # arbitrary pulumi command
  #
  # Local CI simulation:
  #   task infra:ci-test-local                # run lint + test
  #   task infra:ci-simulate-deploy           # full local deployment simulation
