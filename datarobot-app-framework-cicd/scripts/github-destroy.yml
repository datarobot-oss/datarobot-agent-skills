---
# GitHub Actions stack destroy workflow for DataRobot Application Templates
# Copy this to your repository as .github/workflows/destroy.yml
#
# Manually triggered to tear down a named Pulumi stack (e.g. a review app).
# Run via: Actions → "Destroy stack" → enter the stack name.

name: Destroy stack

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: Stack name to destroy (e.g. review-42)
        required: true
        type: string

# Restrict default permissions for all jobs — each job grants only what it needs.
permissions:
  contents: read

jobs:
  destroy:
    name: pulumi-destroy-stack
    runs-on: ubuntu-latest
    env:
      # Bind the user-supplied input to PULUMI_STACK so it is never interpolated
      # directly into the shell script (prevents script injection attacks).
      PULUMI_STACK: ${{ inputs.stack_name }}
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - name: Decrypt secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          passphrase: ${{ secrets.CICD_SECRET_PASSPHRASE }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          working-directory: infra
          python-version: "3.12"

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task install

      - name: Destroy stack
        run: |
          task select -- "$PULUMI_STACK"
          task down-yes
          task pulumi -- stack rm --yes
