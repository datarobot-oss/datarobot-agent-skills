---
# GitHub Actions stack destroy workflow for DataRobot Application Templates
# Copy this to your repository as .github/workflows/destroy.yml
#
# Manually triggered to tear down a named Pulumi stack (e.g. a review app).
# Run via: Actions → "Destroy stack" → enter the stack name.

name: Destroy stack

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: Stack name to destroy (e.g. review-42)
        required: true
        type: string

# Restrict default permissions for all jobs — each job grants only what it needs.
permissions:
  contents: read

jobs:
  destroy:
    name: pulumi-destroy-stack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC authentication to Azure
    env:
      # Bind the user-supplied input to PULUMI_STACK so it is never interpolated
      # directly into the shell script (prevents script injection attacks).
      PULUMI_STACK: ${{ inputs.stack_name }}
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - name: Decrypt secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          passphrase: ${{ secrets.CICD_SECRET_PASSPHRASE }}

      # If using Azure Blob as the Pulumi state backend, derive the backend URL
      # from the container name stored in .env (exported by the decrypt step above).
      # Remove this step if using Pulumi Cloud or another backend.
      - name: Set Pulumi backend URL
        run: echo "PULUMI_BACKEND_URL=azblob://$PULUMI_AZURE_CONTAINER" >> "$GITHUB_ENV"
        if: ${{ env.PULUMI_AZURE_CONTAINER != '' }}

      # Authenticate to Azure using OIDC (no credentials stored in GitHub).
      # Remove this step if not deploying Azure resources.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        if: ${{ vars.AZURE_CLIENT_ID != '' }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          working-directory: infra
          python-version: "3.12"

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task install

      - name: Destroy stack
        run: |
          task select -- "$PULUMI_STACK"
          task down-yes
          task pulumi -- stack rm --yes
