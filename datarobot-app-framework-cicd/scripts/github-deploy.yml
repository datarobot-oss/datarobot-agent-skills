---
# GitHub Actions review app deployment workflow for DataRobot Application Templates
# Copy this to your repository as .github/workflows/deploy.yml
#
# Triggered when the 'deploy' label is applied to a PR. Creates a per-PR ephemeral
# Pulumi stack, runs the full deployment, and posts the stack outputs as a PR comment.
# The stack name prefix is controlled by the PULUMI_STACK_REVIEW_NAME repository variable
# (set via: gh variable set PULUMI_STACK_REVIEW_NAME --body 'review').
#
# To destroy the review stack when you're done, trigger destroy.yml with the stack name.

name: Deploy review app

on:
  pull_request:
    types: [labeled]

# Serialise deployments per PR. cancel-in-progress: false so that adding an
# unrelated label (e.g. 'bug') while a deploy is running doesn't cancel it —
# the new run will simply skip all jobs because the 'deploy' if-condition won't match.
concurrency:
  group: review-${{ github.event.number }}
  cancel-in-progress: false

# Restrict default permissions for all jobs — each job grants only what it needs.
permissions:
  contents: read

env:
  PULUMI_STACK: ${{ vars.PULUMI_STACK_REVIEW_NAME }}-${{ github.event.number }}

jobs:
  # Run linters before spending time on a cloud deployment.
  lint:
    name: lint
    runs-on: ubuntu-latest
    # Only run when the 'deploy' label is applied, and only for same-repo PRs (not forks).
    if: github.event.label.name == 'deploy' && github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          working-directory: infra
          python-version: "3.12"

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task install

      - name: Run linters
        run: task lint-check

  # Deploy the review stack once lint passes.
  deploy:
    name: pulumi-deploy-review-stack
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: write # required to post the deployment comment
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - name: Decrypt secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          passphrase: ${{ secrets.CICD_SECRET_PASSPHRASE }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          working-directory: infra
          python-version: "3.12"

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task install

      - name: Verify secrets
        run: task verify-secrets

      - name: Deploy review stack
        id: deploy
        run: |
          task select -- --create "$PULUMI_STACK"
          task up-yes
          # Capture all stack outputs as JSON for the PR comment
          STACK_OUTPUTS=$(task pulumi -- stack output --json)
          # Use a heredoc delimiter to safely handle multi-line JSON in GITHUB_OUTPUT
          echo "stack_outputs<<PULUMI_OUTPUT_EOF" >> "$GITHUB_OUTPUT"
          echo "$STACK_OUTPUTS" >> "$GITHUB_OUTPUT"
          echo "PULUMI_OUTPUT_EOF" >> "$GITHUB_OUTPUT"

      - name: Comment PR with deployment details
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.number }}
          body: |
            ## 🚀 Review app deployed

            **Stack:** `${{ env.PULUMI_STACK }}`

            <details>
            <summary>Stack outputs</summary>

            ```json
            ${{ steps.deploy.outputs.stack_outputs }}
            ```

            </details>

            > To destroy this stack run the [Destroy workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/destroy.yml) with stack name `${{ env.PULUMI_STACK }}`.
