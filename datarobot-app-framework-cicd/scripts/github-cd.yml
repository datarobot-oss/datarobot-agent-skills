---
# GitHub Actions continuous delivery workflow for DataRobot Application Templates
# Copy this to your repository as .github/workflows/cd.yml
#
# Triggers on every push to the default branch and deploys to the persistent CI stack.
# The stack name is controlled by the PULUMI_STACK_CI_NAME repository variable
# (set via: gh variable set PULUMI_STACK_CI_NAME --body 'ci').

name: CD

on:
  push:
    branches:
      - main

# Serialise deployments to main — never run two deploys concurrently.
concurrency:
  group: cd-main
  cancel-in-progress: false

# Restrict default permissions for all jobs — each job grants only what it needs.
permissions:
  contents: read

env:
  PULUMI_STACK: ${{ vars.PULUMI_STACK_CI_NAME }}

jobs:
  deploy:
    name: pulumi-deploy-ci-stack
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - name: Decrypt secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          passphrase: ${{ secrets.CICD_SECRET_PASSPHRASE }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          working-directory: infra
          python-version: "3.12"

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task install

      - name: Verify secrets
        run: task verify-secrets

      - name: Deploy CI stack
        run: |
          task select -- --create "$PULUMI_STACK"
          task up-yes
