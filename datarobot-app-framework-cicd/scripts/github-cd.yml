---
# GitHub Actions continuous delivery workflow for DataRobot Application Templates
# Copy this to your repository as .github/workflows/cd.yml
#
# Triggers on every push to the default branch and deploys to the persistent CI stack.
# The stack name is controlled by the PULUMI_STACK_CI_NAME repository variable
# (set via: gh variable set PULUMI_STACK_CI_NAME --body 'ci').

name: CD

on:
  push:
    branches:
      - main

# Serialise deployments to main — never run two deploys concurrently.
concurrency:
  group: cd-main
  cancel-in-progress: false

# Restrict default permissions for all jobs — each job grants only what it needs.
permissions:
  contents: read

env:
  PULUMI_STACK: ${{ vars.PULUMI_STACK_CI_NAME }}

jobs:
  deploy:
    name: pulumi-deploy-ci-stack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC authentication to Azure
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - name: Decrypt secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          passphrase: ${{ secrets.CICD_SECRET_PASSPHRASE }}

      # If using Azure Blob as the Pulumi state backend, derive the backend URL
      # from the container name stored in .env (exported by the decrypt step above).
      # Remove this step if using Pulumi Cloud or another backend.
      - name: Set Pulumi backend URL
        run: echo "PULUMI_BACKEND_URL=azblob://$PULUMI_AZURE_CONTAINER" >> "$GITHUB_ENV"
        if: ${{ env.PULUMI_AZURE_CONTAINER != '' }}

      # Authenticate to Azure using OIDC (no credentials stored in GitHub).
      # Requires AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID to be
      # set as GitHub Actions variables, and a federated credential configured on
      # the app registration trusting this repository.
      # Remove this step if not deploying Azure resources.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        if: ${{ vars.AZURE_CLIENT_ID != '' }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          working-directory: infra
          python-version: "3.12"

      - name: Install Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task install

      - name: Verify secrets
        run: task verify-secrets

      - name: Deploy CI stack
        run: |
          task select -- --create "$PULUMI_STACK"
          task up-yes
