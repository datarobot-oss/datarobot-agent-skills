# Example GitLab CI/CD configuration for DataRobot Application Templates
# Copy this to your repository root as .gitlab-ci.yml

image: cimg/python:3.11-node

variables:
  DATAROBOT_ENDPOINT: https://app.datarobot.com/api/v2
  FRONTEND_TYPE: react
  # The following variables should be set in GitLab CI/CD settings:
  # DATAROBOT_API_TOKEN: "$DATAROBOT_API_TOKEN"
  # PULUMI_CONFIG_PASSPHRASE: "$PULUMI_CONFIG_PASSPHRASE"
  # OPENAI_API_VERSION: "$OPENAI_API_VERSION"
  # OPENAI_API_BASE: "$OPENAI_API_BASE"
  # OPENAI_API_DEPLOYMENT_ID: "$OPENAI_API_DEPLOYMENT_ID"
  # OPENAI_API_KEY: "$OPENAI_API_KEY"
  # # Used for Pulumi DIY backend: https://www.pulumi.com/docs/iac/concepts/state-and-backends/
  # AZURE_STORAGE_ACCOUNT: "$AZURE_STORAGE_ACCOUNT"
  # AZURE_STORAGE_KEY: "$AZURE_STORAGE_KEY"
  # GITLAB_API_TOKEN: "$GITLAB_API_TOKEN"

before_script:
  - pip install go-task-bin
  - task install
  - source .venv/bin/activate

stages:
  - check
  - review
  - deploy
  - cleanup

# Linting stage - runs on every merge request
lint:
  stage: check
  script:
    - task lint-check
  only:
    - merge_requests

# Testing stage - runs on every merge request
test:
  stage: check
  script:
    - task test
  only:
    - merge_requests

# Review app deployment - manual trigger for PR validation
review_app:
  stage: review
  script:
    # Install Pulumi
    - curl -fsSL https://get.pulumi.com | sh
    - export PATH="~/.pulumi/bin:$PATH"
    # Login to Pulumi backend (DIY backend example using Azure Blob)
    - pulumi login --cloud-url "azblob://dr-ai-apps-pulumi"
    # Create/select stack with MR-specific name
    - pulumi stack select --create gitlab-mr-$CI_MERGE_REQUEST_IID
    # Deploy the stack
    - pulumi up --yes --stack gitlab-mr-$CI_MERGE_REQUEST_IID
    - echo "Deploying review app for branch gitlab-mr-$CI_MERGE_REQUEST_IID"
    # Get stack outputs and format for GitLab comment
    - STACK_OUTPUT="<br><br>$(pulumi stack output --shell)"
    - STACK_OUTPUT="${STACK_OUTPUT//$'\n'/<br>}"
    # Post comment to merge request with deployment info
    - |
      curl --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
         --data "body=Review Deployment: $STACK_OUTPUT" \
         "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"
  only:
    - merge_requests
  when: manual

# Cleanup review app - manual trigger to destroy resources
destroy_review_app:
  stage: cleanup
  script:
    - curl -fsSL https://get.pulumi.com | sh
    - export PATH="~/.pulumi/bin:$PATH"
    - pulumi login --cloud-url "azblob://dr-ai-apps-pulumi"
    # Destroy the stack
    - pulumi destroy --yes --stack gitlab-mr-$CI_MERGE_REQUEST_IID
    # Remove the stack from Pulumi backend
    - pulumi stack rm gitlab-mr-$CI_MERGE_REQUEST_IID --yes
    - echo "Destroyed review app stack for MR gitlab-mr-$CI_MERGE_REQUEST_IID"
  only:
    - merge_requests
    - main
  when: manual
  needs:
    - job: review_app
      optional: true

# Continuous delivery - automatic deployment on merge to main
deploy_ci:
  stage: deploy
  script:
    - curl -fsSL https://get.pulumi.com | sh
    - export PATH="~/.pulumi/bin:$PATH"
    - pulumi login --cloud-url "azblob://dr-ai-apps-pulumi"
    # Use fixed stack name for CI environment
    - pulumi stack select ci
    - pulumi up --yes --stack ci
    - echo "Deployed CI stack"
  only:
    - main
  when: on_success
